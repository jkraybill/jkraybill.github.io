name: Build and Deploy

on:
  push:
    branches: [main]
  schedule:
    # Rebuild weekly to pick up new repos with Pages
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 build.py --token "$GITHUB_TOKEN"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Rebuild index" && git push
